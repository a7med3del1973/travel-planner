
services:
  db:
    image: postgres:15-alpine
    container_name: travel_planner_db
    restart: always
    environment:
      POSTGRES_DB: travel_planner_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backEnd
    container_name: travel_planner_app
    restart: always
    ports:
      - "9090:9090"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/travel_planner_db
      - DB_USER=postgres
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontEnd
    container_name: travel_planner_frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - app

volumes:
  postgres_data:
