<div class="admin-shell">
  <!-- Sidebar -->
  <aside class="sidebar" role="navigation" aria-label="Admin navigation">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fa-solid fa-paper-plane"></i></span>
      <div>
        <span class="brand-name">TravelPlanner</span>
        <span class="brand-role">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item"
          [attr.aria-label]="item.label"
        >
          <i [class]="item.icon" class="nav-icon" aria-hidden="true"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ authStore.username()?.charAt(0)?.toUpperCase() }}</div>
        <div class="user-details">
          <span class="user-name">{{ authStore.username() }}</span>
          <span class="user-role">Administrator</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" aria-label="Logout">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet />
  </main>
</div>
